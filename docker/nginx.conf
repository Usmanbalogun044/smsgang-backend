server_tokens off;

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;

client_max_body_size 100M;

# HTTP — redirect to HTTPS + handle certbot challenge
server {
    listen 80;
    listen [::]:80;
    server_name api.smsgang.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — proxy to app container
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.smsgang.org;

    ssl_certificate /etc/letsencrypt/live/api.smsgang.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.smsgang.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Proxy all requests to the app container
    location / {
        proxy_pass http://smsgang-app:80;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* { deny all; }
}

# HTTP — NaijaTrip API: serve directly for now so nginx does not depend on
# a certificate that may not exist yet.
