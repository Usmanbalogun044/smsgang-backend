server_tokens off;

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Client body size
client_max_body_size 100M;

# Keep-alive settings
keepalive_requests 10000;
keepalive_timeout 65;

# Upstream app service
upstream backend_app {
    server app:80;
    keepalive 32;
}

# NOTE: This nginx config only handles the BACKEND API (api.smsgang.org)
# Frontend (smsgang.org) is hosted on Vercel
# Admin panel (admin.smsgang.org) is hosted separately
# This backend container only serves API requests

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.smsgang.org _;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;

        # Health check endpoint (no redirect)
        location /api/health {
            proxy_pass http://backend_app;
            access_log off;
        }
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server for API backend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.smsgang.org;

    # SSL configuration (Let's Encrypt certificates)
    ssl_certificate /etc/letsencrypt/live/api.smsgang.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.smsgang.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
    gzip_min_length 1000;
    gzip_vary on;

    # Proxy settings
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;

    # API endpoints
    location / {
        proxy_pass http://backend_app;
    }

    # Health check endpoint (no logging)
    location /health {
        proxy_pass http://backend_app;
        access_log off;
    }
}
