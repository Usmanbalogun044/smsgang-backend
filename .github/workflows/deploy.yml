name: Deploy to Production

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/smsgang-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/smsgang-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null || { echo "❌ Invalid SSH key"; exit 1; }
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Prepare VPS target path
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            mkdir -p ${{ secrets.VPS_PATH }}/docker
            if [ -d "${{ secrets.VPS_PATH }}/openapi.yml" ]; then
              rm -rf "${{ secrets.VPS_PATH }}/openapi.yml"
            fi

      - name: Copy configs to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          source: "deploy.sh,openapi.yml,docker-compose.prod.yml,docker/nginx.conf,.env.production"
          target: ${{ secrets.VPS_PATH }}
          overwrite: true
          rm: false

      - name: Setup .env on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            [ -f .env.production ] && mv .env.production .env
            sed -i 's/\r$//' .env
            # Always inject correct Docker vars
            grep -q '^DOCKER_USERNAME=' .env \
              && sed -i "s|^DOCKER_USERNAME=.*|DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}|" .env \
              || echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
            grep -q '^DOCKER_TAG=' .env \
              && sed -i "s|^DOCKER_TAG=.*|DOCKER_TAG=${{ github.sha }}|" .env \
              || echo "DOCKER_TAG=${{ github.sha }}" >> .env
            grep -q '^APP_KEY=' .env || { echo '❌ APP_KEY missing in .env'; exit 1; }
            echo "✅ .env ready"

      - name: Login to Docker Hub on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            echo "✅ Docker Hub login successful"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export DOCKER_TAG=${{ github.sha }}

            echo "📥 Pulling latest image..."
            docker compose --env-file .env -f docker-compose.prod.yml pull

            echo "🚀 Restarting services..."
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans

            echo "⏳ Waiting for app to boot..."
            sleep 15

            echo "🗄️ Running migrations..."
            docker compose --env-file .env -f docker-compose.prod.yml exec -T smsgang-app php artisan migrate --force

            echo "⚙️ Caching config and routes..."
            docker compose --env-file .env -f docker-compose.prod.yml exec -T smsgang-app php artisan config:cache
            docker compose --env-file .env -f docker-compose.prod.yml exec -T smsgang-app php artisan route:clear
            docker compose --env-file .env -f docker-compose.prod.yml exec -T smsgang-app php artisan route:cache

            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete"

      - name: Health Check
        run: |
          echo "⏳ Waiting for services to stabilize..."
          sleep 20

          echo "🔍 Checking smsgang-app container..."
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_PATH }} && \
             docker compose --env-file .env -f docker-compose.prod.yml ps --services --status running | grep -q '^smsgang-app$'" \
            && echo "✅ smsgang-app is running" || { echo "❌ smsgang-app is not running"; exit 1; }

          echo "🏥 Running HTTP health check..."
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "curl -fsS http://localhost/api/health" \
            && echo "✅ Health check passed" || { echo "❌ Health check failed"; exit 1; }

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          echo ""
          echo "To debug, SSH into VPS and run:"
          echo "  cd ${{ secrets.VPS_PATH }}"
          echo "  docker compose --env-file .env -f docker-compose.prod.yml logs --tail=100"