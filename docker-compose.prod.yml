services:
  app:
    image: ${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE:-usmanbalogun044/smsgang-backend}:${DOCKER_TAG:-latest}
    container_name: smsgang-app
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.env:/var/www/html/.env
    depends_on:
      - smsgangredis
    environment:
      - CONTAINER_ROLE=app
      - PHP_POST_MAX_SIZE=100M
      - PHP_UPLOAD_MAX_FILESIZE=100M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app_smsgang

  smsgangredis:
    image: redis:7-alpine
    container_name: smsgang-redis
    restart: always
    ports:
      - "${FORWARD_REDIS_PORT:-6382}:6379"
    volumes:
      - smsgang-redis:/data
    networks:
      - app_smsgang
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s
    command: redis-server --appendonly yes --replica-read-only no

  adminer:
    image: adminer:latest
    container_name: smsgang-adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=${DB_HOST:-host.docker.internal}
      - ADMINER_DEFAULT_PORT=${DB_PORT:-3306}
      - ADMINER_DEFAULT_USER=${DB_USERNAME:-root}
    networks:
      - app_smsgang

  dozzle:
    image: amir20/dozzle:latest
    container_name: smsgang-dozzle
    restart: always
    ports:
      - "9001:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app_smsgang

  swagger:
    image: swaggerapi/swagger-ui:v5.10.3
    container_name: smsgang-swagger
    restart: always
    ports:
      - "9002:8080"
    volumes:
      - ./openapi.yml:/usr/share/nginx/html/openapi.yml:ro
    environment:
      - SWAGGER_JSON=/openapi.yml
    networks:
      - app_smsgang

  nginx:
    image: nginx:1.25-alpine
    container_name: smsgang-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /data/certbot/www/:/var/www/certbot/
      - /data/certbot/letsencrypt/:/etc/letsencrypt/
      - ./server/default-production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app_smsgang
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot:v2.6.0
    container_name: smsgang-certbot
    restart: unless-stopped
    volumes:
      - /data/certbot/www/:/var/www/certbot/
      - /data/certbot/letsencrypt/:/etc/letsencrypt/
    networks:
      - app_smsgang
    depends_on:
      - nginx
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot/ && nginx -s reload || true; sleep 12h & wait $${!}; done;'"

volumes:
  smsgang-redis:
    driver: local

networks:
  app_smsgang:
    driver: bridge
