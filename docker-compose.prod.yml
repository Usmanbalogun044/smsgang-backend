services:
  smsgang-redis:
    image: redis:7-alpine
    container_name: smsgang-redis-prod
    restart: always
    command: redis-server --appendonly yes
    networks:
      - smsgang
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  smsgang-app:
    image: "${DOCKER_USERNAME}/smsgang-backend:${DOCKER_TAG:-latest}"
    container_name: smsgang-app-prod
    restart: always
    working_dir: /var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Stable way to reach VPS host MySQL
    environment:
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-https://api.smsgang.org}

      # ── MySQL (running on VPS host, outside Docker) ──────────────────
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-smsgang_db}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

      # ── Redis (inside Docker) ─────────────────────────────────────────
      REDIS_HOST: smsgang-redis
      REDIS_PORT: 6379
      REDIS_CLIENT: phpredis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis

      # ── App config ────────────────────────────────────────────────────
      LOG_CHANNEL: stack
      SESSION_DOMAIN: .smsgang.org
      SESSION_SECURE_COOKIE: "true"
      SESSION_SAME_SITE: "none"
      SANCTUM_STATEFUL_DOMAINS: smsgang.org,admin.smsgang.org
      CORS_ALLOWED_ORIGINS: https://smsgang.org,https://www.smsgang.org
      CORS_SUPPORTS_CREDENTIALS: "true"
    env_file:
      - ./.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./.env:/var/www/html/.env:ro
      - /data/certbot/letsencrypt/:/etc/letsencrypt/:ro
      - /data/certbot/www/:/var/www/html/public/.well-known/acme-challenge/:ro
      - smsgang_storage_logs:/var/www/html/storage/logs
      - smsgang_storage_app:/var/www/html/storage/app
    depends_on:
      smsgang-redis:
        condition: service_healthy
    networks:
      - smsgang
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  smsgang-certbot:
    image: certbot/certbot:v2.6.0
    container_name: smsgang-certbot-prod
    restart: unless-stopped
    volumes:
      - /data/certbot/www/:/var/www/certbot/
      - /data/certbot/letsencrypt/:/etc/letsencrypt/
    networks:
      - smsgang
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  smsgang-dozzle:
    image: amir20/dozzle:latest
    container_name: smsgang-dozzle-prod
    restart: always
    ports:
      - "9001:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - smsgang

  smsgang-swagger:
    image: swaggerapi/swagger-ui:v5.10.3
    container_name: smsgang-swagger-prod
    restart: always
    ports:
      - "9002:8080"
    volumes:
      - ./openapi.yml:/usr/local/openapi.yml:ro
    environment:
      SWAGGER_JSON: /usr/local/openapi.yml
    networks:
      - smsgang
    depends_on:
      - smsgang-app

  smsgang-adminer:
    image: adminer:latest
    container_name: smsgang-adminer-prod
    restart: always
    ports:
      - "9003:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ADMINER_DEFAULT_SERVER: host.docker.internal
    networks:
      - smsgang
    depends_on:
      - smsgang-app

networks:
  smsgang:
    driver: bridge

volumes:
  redis_data:
  smsgang_storage_logs:
  smsgang_storage_app: