services:
  app:
    image: "${DOCKER_REGISTRY:-ghcr.io}/${DOCKER_IMAGE:-smsgang/backend}:${DOCKER_TAG:-latest}"
    container_name: smsgang-backend-prod
    working_dir: /var/www/html
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # External MySQL (NOT in Docker)
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-smsgang}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      # External Redis (NOT in Docker)
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      LOG_CHANNEL: stack
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_URL: ${ADMIN_URL}
      VERIFY_PAYMENT_URL: ${VERIFY_PAYMENT_URL}
      FIVESIM_API_KEY: ${FIVESIM_API_KEY}
      LENDOVERIFY_API_KEY: ${LENDOVERIFY_API_KEY}
      LENDOVERIFY_BASE_URL: ${LENDOVERIFY_BASE_URL}
      CURRENCY_API_KEY: ${CURRENCY_API_KEY}
      CURRENCY_API_HOST: ${CURRENCY_API_HOST}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
      - "9000:9000"
    networks:
      - smsgang
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:1.25-alpine
    container_name: smsgang-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/default-production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - smsgang
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dozzle - Docker log viewer
  dozzle:
    image: amir20/dozzle:latest
    container_name: smsgang-dozzle-prod
    restart: always
    ports:
      - "9001:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - smsgang
    environment:
      DOZZLE_LEVEL: info

  # Swagger API documentation
  swagger:
    image: swaggerapi/swagger-ui:v5.10.3
    container_name: smsgang-swagger-prod
    restart: always
    ports:
      - "9002:8080"
    volumes:
      - ./openapi.yml:/usr/local/openapi.yml:ro
    environment:
      SWAGGER_JSON: /usr/local/openapi.yml
      URLS: "[{url: 'file:///usr/local/openapi.yml', name: 'SMSGang API'}]"
    networks:
      - smsgang

networks:
  smsgang:
    driver: bridge
